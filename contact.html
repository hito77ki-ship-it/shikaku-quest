<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜スタディクエスト</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--green:#8CC63F;--green2:#6AAF2B;--text:#1A202C;--muted:#718096;--border:#E2E8F0;--bg:#FFFFFF;}
body{font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);line-height:1.8;}
a{text-decoration:none;color:var(--green2);}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 24px;}
.nav-inner{max-width:1080px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Cinzel',serif;font-size:15px;color:var(--green2);letter-spacing:.1em;display:flex;align-items:center;gap:8px;}
.nav-logo span{font-size:20px;}
.nav-back{color:var(--muted);font-size:13px;padding:9px 20px;border-radius:100px;border:1px solid var(--border);transition:all .2s;}
.nav-back:hover{border-color:var(--green);color:var(--green);}

.container{max-width:680px;margin:0 auto;padding:100px 24px 64px;text-align:center;}
h1{font-size:28px;font-weight:700;margin-bottom:12px;}
.lead{color:var(--muted);font-size:15px;margin-bottom:40px;line-height:1.8;}

.form-wrap{
  border-radius:16px;overflow:hidden;
  border:1px solid var(--border);
  background:#fff;
}
.form-wrap iframe{
  width:100%;border:none;
  min-height:680px;display:block;
}

footer{background:#111827;padding:32px 24px;text-align:center;margin-top:64px;}
.footer-logo{font-family:'Cinzel',serif;font-size:14px;color:#4A5568;margin-bottom:12px;}
.footer-links{display:flex;justify-content:center;gap:24px;margin-bottom:16px;flex-wrap:wrap;}
.footer-links a{font-size:12px;color:#4A5568;transition:color .2s;}
.footer-links a:hover{color:#8CC63F;}
.footer-copy{font-size:11px;color:#2D3748;}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="lp.html"><span>⚔</span> スタディクエスト</a>
    <a class="nav-back" href="lp.html">← LPに戻る</a>
  </div>
</nav>

<div class="container">
  <h1>お問い合わせ</h1>
  <p class="lead">バグの報告・機能のご要望・その他ご質問はこちらからどうぞ。<br>通常2〜3日以内にご返信します。</p>

  <div class="form-wrap">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSffAgcOkl6am1JgoiHQGiYDnpC0rISkfA2aOncEmsRNEHirQw/viewform?embedded=true"
      title="お問い合わせフォーム">
      読み込んでいます…
    </iframe>
  </div>
</div>

<footer>
  <div class="footer-logo">⚔ スタディクエスト</div>
  <div class="footer-links">
    <a href="index.html">アプリを使う</a>
    <a href="terms.html">利用規約</a>
    <a href="privacy.html">プライバシーポリシー</a>
    <a href="tokusho.html">特定商取引法</a>
    <a href="contact.html">お問い合わせ</a>
  </div>
  <div class="footer-copy">© 2026 スタディクエスト. All rights reserved.</div>
</footer>

</body>
</html>
