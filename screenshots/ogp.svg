<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a3a08"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="35%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#8CC63F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8CC63F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#greenGlow)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- App icon area -->
  <rect x="80" y="200" width="120" height="120" rx="28" fill="#0d1f07" stroke="#8CC63F" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="140" y="275" text-anchor="middle" font-size="52" font-family="serif">⚔</text>
  <!-- Title -->
  <text x="80" y="175" font-family="Georgia, serif" font-size="22" fill="#8CC63F" opacity="0.7" letter-spacing="6">STUDY QUEST</text>
  <text x="80" y="390" font-family="Georgia, serif" font-size="68" font-weight="bold" fill="#FFFFFF" letter-spacing="1">すべての勉強を、</text>
  <text x="80" y="470" font-family="Georgia, serif" font-size="68" font-weight="bold" fill="#8CC63F" letter-spacing="1">終わらない冒険に。</text>
  <!-- Sub text -->
  <text x="80" y="535" font-family="sans-serif" font-size="24" fill="rgba(255,255,255,0.5)">資格・受験・検定に対応したRPG風学習トラッカー ── 完全無料</text>
  <!-- Right decorative element -->
  <circle cx="980" cy="315" r="220" fill="none" stroke="#8CC63F" stroke-opacity="0.06" stroke-width="1.5"/>
  <circle cx="980" cy="315" r="160" fill="none" stroke="#8CC63F" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="980" cy="315" r="90" fill="rgba(140,198,63,0.07)"/>
  <text x="980" y="340" text-anchor="middle" font-size="72" font-family="serif" opacity="0.6">⚔</text>
</svg>
