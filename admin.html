<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — Study Quest</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0B0F17;color:#E8EEF8;min-height:100vh;font-size:14px;}
a{color:#8CC63F;text-decoration:none;}
a:hover{text-decoration:underline;}
button{font-family:inherit;cursor:pointer;}

/* ── Auth gate ── */
.gate{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.gate-card{background:#121826;border:1px solid rgba(140,198,63,.22);border-radius:16px;padding:44px 36px;text-align:center;max-width:360px;width:90%;}
.gate-logo{font-size:40px;margin-bottom:14px;}
.gate-title{font-size:22px;font-weight:700;color:#8CC63F;margin-bottom:6px;}
.gate-sub{font-size:13px;color:#9BA7BB;margin-bottom:28px;line-height:1.75;}
.btn-google{display:inline-flex;align-items:center;gap:10px;padding:13px 26px;border-radius:100px;border:1px solid rgba(140,198,63,.28);background:#151A2A;color:#E8EEF8;font-size:14px;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;}
.btn-google:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.gate-error{color:#EF4444;font-size:13px;margin-top:18px;line-height:1.6;}

/* ── Nav ── */
.admin-nav{background:#080B12;border-bottom:1px solid rgba(140,198,63,.12);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-brand{font-size:15px;font-weight:700;color:#8CC63F;display:flex;align-items:center;gap:8px;}
.nav-user{display:flex;align-items:center;gap:10px;}
.nav-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;}
.nav-name{font-size:13px;color:#9BA7BB;}
.btn-logout{background:none;border:1px solid rgba(255,255,255,.14);color:#9BA7BB;border-radius:100px;padding:5px 14px;font-size:12px;cursor:pointer;transition:color .2s,border-color .2s;}
.btn-logout:hover{color:#E8EEF8;border-color:rgba(255,255,255,.3);}

/* ── Tabs ── */
.tab-bar{background:#0D1320;border-bottom:1px solid rgba(255,255,255,.05);padding:0 24px;display:flex;gap:2px;overflow-x:auto;}
.tab-btn{padding:14px 18px;border:none;background:none;color:#9BA7BB;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s,border-color .2s;}
.tab-btn:hover{color:#E8EEF8;}
.tab-btn.active{color:#8CC63F;border-bottom-color:#8CC63F;}

/* ── Content ── */
.admin-content{padding:28px 24px;max-width:1200px;margin:0 auto;}

/* ── Stat cards ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:28px;}
.stat-card{background:#121826;border:1px solid rgba(140,198,63,.14);border-radius:12px;padding:18px 16px;text-align:center;}
.stat-num{font-size:30px;font-weight:700;color:#8CC63F;font-variant-numeric:tabular-nums;}
.stat-label{font-size:11px;color:#9BA7BB;margin-top:5px;letter-spacing:.05em;}

/* ── Table ── */
.table-wrap{background:#121826;border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:#0D1320;padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:#6B7280;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
td{padding:11px 14px;border-top:1px solid rgba(255,255,255,.04);font-size:13px;color:#CCD6E5;vertical-align:top;}
tr:hover td{background:rgba(140,198,63,.03);}
.td-rank{color:#6B7280;font-size:12px;width:36px;}
.td-article{max-width:220px;}
.td-article a{color:#E8EEF8;font-weight:600;font-size:13px;}
.td-article a:hover{color:#8CC63F;}
.td-body{max-width:300px;}
.td-body-text{color:#9BA7BB;font-size:13px;line-height:1.5;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.td-num{text-align:right;font-weight:700;color:#8CC63F;font-variant-numeric:tabular-nums;white-space:nowrap;}
.td-total{text-align:right;font-weight:800;color:#B6E27C;font-variant-numeric:tabular-nums;}
.td-time{color:#6B7280;font-size:12px;white-space:nowrap;}
.badge-report{display:inline-block;background:rgba(239,68,68,.15);color:#EF4444;border:1px solid rgba(239,68,68,.28);border-radius:100px;padding:2px 8px;font-size:11px;font-weight:700;}

/* ── Action buttons ── */
.btn-del{background:transparent;border:1px solid rgba(239,68,68,.32);color:#EF4444;border-radius:100px;padding:4px 12px;font-size:12px;cursor:pointer;transition:background .2s;}
.btn-del:hover{background:rgba(239,68,68,.12);}
.btn-dismiss{background:transparent;border:1px solid rgba(140,198,63,.3);color:#8CC63F;border-radius:100px;padding:4px 12px;font-size:12px;cursor:pointer;margin-left:6px;transition:background .2s;}
.btn-dismiss:hover{background:rgba(140,198,63,.1);}

/* ── Filter ── */
.filter-row{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.filter-select{background:#121826;border:1px solid rgba(255,255,255,.14);color:#E8EEF8;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;cursor:pointer;}
.filter-input{background:#121826;border:1px solid rgba(255,255,255,.14);color:#E8EEF8;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;width:220px;}
.filter-input::placeholder{color:#6B7280;}
.filter-input:focus,.filter-select:focus{outline:none;border-color:#8CC63F;}

/* ── States ── */
.empty{text-align:center;color:#6B7280;padding:52px 24px;font-size:13px;}
.loading{text-align:center;color:#9BA7BB;padding:52px 24px;font-size:13px;}
.ok-badge{display:inline-block;background:rgba(52,211,153,.12);color:#34D399;border:1px solid rgba(52,211,153,.24);border-radius:100px;padding:4px 14px;font-size:13px;font-weight:700;}

@media(max-width:640px){
  .admin-content{padding:16px;}
  .tab-btn{padding:12px 10px;font-size:12px;}
  .stat-num{font-size:24px;}
  .nav-name{display:none;}
  .filter-input{width:100%;}
}
</style>

function artTitle(id){ return TITLES[id] || id; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function relTime(ts){
  const d=Date.now()-new Date(ts).getTime(), m=Math.floor(d/60000);
  if(m<1)return'たった今'; if(m<60)return m+'分前';
  const h=Math.floor(m/60); if(h<24)return h+'時間前';
  const dy=Math.floor(h/24); if(dy<30)return dy+'日前';
  return new Date(ts).toLocaleDateString('ja-JP');
}

/* ── Supabase ── */
let sb=null, adminUser=null, token=null;

async function initSB(){
  return new Promise(resolve=>{
    if(window.supabase){sb=window.supabase.createClient(SB_URL,SB_ANON);resolve();return;}
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
    s.onload=()=>{sb=window.supabase.createClient(SB_URL,SB_ANON);resolve();};
    s.onerror=()=>resolve();
    document.head.appendChild(s);
  });
}
async function getToken(){
  if(token)return token;
  const{data}=await sb.auth.getSession();
  token=data.session?.access_token||SB_ANON;
  return token;
}
async function sbFetch(path,opts={}){
  const t=await getToken();
  return fetch(SB_URL+path,{...opts,headers:{'apikey':SB_ANON,'Authorization':'Bearer '+t,...opts.headers}});
}
async function rpc(fn,params={}){
  const t=await getToken();
  const r=await fetch(`${SB_URL}/rest/v1/rpc/${fn}`,{
    method:'POST',
    headers:{'apikey':SB_ANON,'Authorization':'Bearer '+t,'Content-Type':'application/json'},
    body:JSON.stringify(params)
  });
  return r.json();
}

/* ── Tabs ── */
const loadedTabs=new Set();
function switchTab(name,btn){
  document.querySelectorAll('[id^="tab-"]').forEach(el=>el.hidden=true);
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).hidden=false;
  btn.classList.add('active');
  if(!loadedTabs.has(name))loadTab(name);
}
async function loadTab(name){
  loadedTabs.add(name);
  if(name==='reactions')await loadReactions();
  else if(name==='comments')await loadComments();
  else if(name==='reports')await loadReports();
  else if(name==='views')await loadViews();
}

/* ── 📊 リアクション ── */
async function loadReactions(){
  const panel=document.getElementById('tab-reactions');
  try{
    const r=await sbFetch('/rest/v1/article_reactions?select=article_id,reaction_type');
    const rows=await r.json();
    if(!Array.isArray(rows))throw 0;
    const map={};
    rows.forEach(({article_id,reaction_type})=>{
      if(!map[article_id])map[article_id]={helpful:0,learned:0,motivated:0};
      if(map[article_id][reaction_type]!==undefined)map[article_id][reaction_type]++;
    });
    const entries=Object.entries(map)
      .map(([id,c])=>({id,...c,total:c.helpful+c.learned+c.motivated}))
      .sort((a,b)=>b.total-a.total);
    const helpful=entries.reduce((s,e)=>s+e.helpful,0);
    const learned=entries.reduce((s,e)=>s+e.learned,0);
    const motivated=entries.reduce((s,e)=>s+e.motivated,0);
    panel.innerHTML=`
      <div class="stat-row">
        <div class="stat-card"><div class="stat-num">${rows.length}</div><div class="stat-label">リアクション合計</div></div>
        <div class="stat-card"><div class="stat-num">${entries.length}</div><div class="stat-label">リアクションのある記事</div></div>
        <div class="stat-card"><div class="stat-num">${helpful}</div><div class="stat-label">👍 参考になった</div></div>
        <div class="stat-card"><div class="stat-num">${learned}</div><div class="stat-label">💡 勉強になった</div></div>
        <div class="stat-card"><div class="stat-num">${motivated}</div><div class="stat-label">🔥 モチベ上がった</div></div>
      </div>
      ${entries.length===0?'<div class="empty">リアクションデータがありません</div>':`
      <div class="table-wrap"><table>
        <thead><tr><th>#</th><th>記事</th><th>👍 参考</th><th>💡 学び</th><th>🔥 モチベ</th><th>合計</th></tr></thead>
        <tbody>${entries.map((e,i)=>`<tr>
          <td class="td-rank">${i+1}</td>
          <td class="td-article"><a href="${esc(e.id)}" target="_blank">${esc(artTitle(e.id))}</a></td>
          <td class="td-num">${e.helpful}</td><td class="td-num">${e.learned}</td><td class="td-num">${e.motivated}</td>
          <td class="td-total">${e.total}</td>
        </tr>`).join('')}</tbody>
      </table></div>`}`;
  }catch{panel.innerHTML='<div class="empty">データの取得に失敗しました</div>';}
}

/* ── 💬 コメント ── */

  }catch{panel.innerHTML='<div class="empty">データの取得に失敗しました</div>';}
}

    </div>

      <select class="filter-select" id="commentArticleFilter" onchange="filterComments()">
        <option value="">全記事</option>
        ${articles.map(a=>`<option value="${esc(a)}">${esc(artTitle(a))}</option>`).join('')}
      </select>
      <input class="filter-input" id="commentSearch" type="text" placeholder="コメント・ユーザー名で検索" oninput="filterComments()">
    </div>
    <div id="commentTableWrap"></div>`;
  renderCommentTable(allComments);
}

function filterComments(){
  const article=document.getElementById('commentArticleFilter')?.value||'';
  const query=(document.getElementById('commentSearch')?.value||'').toLowerCase();
  renderCommentTable(allComments.filter(c=>
    (!article||c.article_id===article)&&
    (!query||c.body.toLowerCase().includes(query)||c.user_name.toLowerCase().includes(query))
  ));
}

function renderCommentTable(comments){
  const wrap=document.getElementById('commentTableWrap');
  if(!wrap)return;
  if(!comments.length){wrap.innerHTML='<div class="empty">コメントがありません</div>';return;}
  wrap.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>記事</th><th>ユーザー</th><th>コメント</th><th>通報</th><th>投稿日時</th><th>操作</th></tr></thead>
    <tbody>${comments.map(c=>`<tr id="crow-${c.id}">
      <td class="td-article" style="min-width:130px"><a href="${esc(c.article_id)}" target="_blank">${esc(artTitle(c.article_id))}</a></td>
      <td style="white-space:nowrap;min-width:90px">${esc(c.user_name)}</td>
      <td class="td-body" style="min-width:180px"><div class="td-body-text">${esc(c.body)}</div></td>
      <td>${c.report_count>0?`<span class="badge-report">🚩 ${c.report_count}</span>`:'—'}</td>
      <td class="td-time">${relTime(c.created_at)}</td>
      <td style="white-space:nowrap"><button class="btn-del" onclick="adminDelete(${c.id},'crow')">削除</button></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

/* ── 🚩 通報 ── */
let reportedComments=[];
async function loadReports(){
  const panel=document.getElementById('tab-reports');
  try{
    if(!allComments.length){
      const data=await rpc('admin_get_all_comments');
      allComments=Array.isArray(data)?data:[];
    }
    reportedComments=allComments.filter(c=>c.report_count>=1).sort((a,b)=>b.report_count-a.report_count);
    renderReports(panel);
  }catch{panel.innerHTML='<div class="empty">データの取得に失敗しました</div>';}
}

function renderReports(panel){
  if(!reportedComments.length){
    panel.innerHTML=`
      <div class="stat-row"><div class="stat-card"><div class="stat-num" style="color:#34D399">0</div><div class="stat-label">通報案件</div></div></div>
      <div class="empty"><span class="ok-badge">✅ 通報されたコメントはありません</span></div>`;
    return;
  }
  panel.innerHTML=`
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num" style="color:#EF4444">${reportedComments.length}</div><div class="stat-label">通報案件</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#EF4444">${reportedComments.reduce((s,c)=>s+c.report_count,0)}</div><div class="stat-label">通報累計</div></div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>記事</th><th>ユーザー</th><th>コメント</th><th>通報数</th><th>投稿日時</th><th>操作</th></tr></thead>
      <tbody>${reportedComments.map(c=>`<tr id="rrow-${c.id}">
        <td class="td-article"><a href="${esc(c.article_id)}" target="_blank">${esc(artTitle(c.article_id))}</a></td>
        <td style="white-space:nowrap">${esc(c.user_name)}</td>
        <td class="td-body"><div class="td-body-text">${esc(c.body)}</div></td>
        <td><span class="badge-report">🚩 ${c.report_count}</span></td>
        <td class="td-time">${relTime(c.created_at)}</td>
        <td style="white-space:nowrap">
          <button class="btn-del" onclick="adminDelete(${c.id},'rrow')">削除</button>
          <button class="btn-dismiss" onclick="adminDismiss(${c.id})">無視</button>
        </td>
      </tr>`).join('')}</tbody>
    </table></div>
    <p style="margin-top:12px;font-size:12px;color:#6B7280">
      <strong style="color:#9BA7BB">削除</strong>：コメントを完全削除 ／ <strong style="color:#9BA7BB">無視</strong>：通報をリセットして表示に戻す
    </p>`;
}

/* ── 👁 閲覧数 ── */
async function loadViews(){
  const panel=document.getElementById('tab-views');
  try{
    const r=await sbFetch('/rest/v1/article_views?order=view_count.desc&limit=100');
    const rows=await r.json();
    if(!Array.isArray(rows))throw 0;
    const totalPV=rows.reduce((s,r)=>s+Number(r.view_count),0);
    panel.innerHTML=`
      <div class="stat-row">
        <div class="stat-card"><div class="stat-num">${totalPV.toLocaleString()}</div><div class="stat-label">累計ページビュー</div></div>
        <div class="stat-card"><div class="stat-num">${rows.length}</div><div class="stat-label">計測済み記事数</div></div>
        ${rows.length?`<div class="stat-card"><div class="stat-num">${Math.round(totalPV/rows.length).toLocaleString()}</div><div class="stat-label">記事あたり平均PV</div></div>`:''}
      </div>
      ${!rows.length?'<div class="empty">閲覧データがありません（記事を開くと計測が始まります）</div>':`
      <div class="table-wrap"><table>
        <thead><tr><th>#</th><th>記事</th><th>閲覧数</th><th>最終アクセス</th></tr></thead>
        <tbody>${rows.map((row,i)=>`<tr>
          <td class="td-rank">${i+1}</td>
          <td class="td-article"><a href="${esc(row.article_id)}" target="_blank">${esc(artTitle(row.article_id))}</a></td>
          <td class="td-total">${Number(row.view_count).toLocaleString()}</td>
          <td class="td-time">${relTime(row.updated_at)}</td>
        </tr>`).join('')}</tbody>
      </table></div>`}`;
  }catch{panel.innerHTML='<div class="empty">データの取得に失敗しました</div>';}
}

/* ── Admin actions ── */
async function adminDelete(commentId,rowPrefix){
  if(!confirm('このコメントを完全に削除しますか？'))return;
  try{
    await rpc('admin_delete_comment',{p_comment_id:commentId});
    document.getElementById(`${rowPrefix}-${commentId}`)?.remove();
    allComments=allComments.filter(c=>c.id!==commentId);
    reportedComments=reportedComments.filter(c=>c.id!==commentId);
  }catch{alert('削除に失敗しました');}
}

async function adminDismiss(commentId){
  if(!confirm('この通報を無視しますか？（コメントは残り、通報記録がリセットされます）'))return;
  try{
    await rpc('admin_dismiss_report',{p_comment_id:commentId});
    document.getElementById(`rrow-${commentId}`)?.remove();
    reportedComments=reportedComments.filter(c=>c.id!==commentId);
    const crow=document.getElementById(`crow-${commentId}`);
    if(crow){const cell=crow.querySelector('td:nth-child(4)');if(cell)cell.textContent='—';}
    allComments=allComments.map(c=>c.id===commentId?{...c,report_count:0}:c);
    if(!reportedComments.length)renderReports(document.getElementById('tab-reports'));
  }catch{alert('操作に失敗しました');}
}
</script>
</body>
</html>
